<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraScape CRM</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel (for JSX in browser) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Constants ──────────────────────────────────────────────────────────────
    const STAGES = ["Lead", "Quoted", "Deposit Paid", "Confirmed", "Completed", "Lost"];
    const SERVICES = [
      "Luxury Hotel", "Economical Hotel", "Business/Premium Flight", "Economy Flight",
      "Cruise", "Visa", "Transfer", "Insurance", "Luxe Adventure", "Corporate", "Other"
    ];
    const STAGE_COLORS = {
      "Lead":          "bg-blue-100 text-blue-800",
      "Quoted":        "bg-yellow-100 text-yellow-800",
      "Deposit Paid":  "bg-orange-100 text-orange-800",
      "Confirmed":     "bg-purple-100 text-purple-800",
      "Completed":     "bg-green-100 text-green-800",
      "Lost":          "bg-red-100 text-red-800",
    };
    const STAGE_BORDER = {
      "Lead":          "border-blue-300",
      "Quoted":        "border-yellow-300",
      "Deposit Paid":  "border-orange-300",
      "Confirmed":     "border-purple-300",
      "Completed":     "border-green-300",
      "Lost":          "border-red-300",
    };
    const EMPTY_FORM = {
      name: "", email: "", phone: "", type: "Leisure",
      stage: "Lead", services: [], destination: "",
      travelDate: "", budgetUsd: "", notes: "", source: "Referral"
    };
    const BRAND = "#1B3F6E";
    const GOLD  = "#C9A84C";
    const STORAGE_KEY = "aurascape_crm_v1";

    // ── Helpers ────────────────────────────────────────────────────────────────
    function genId() { return "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7); }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const data = JSON.parse(raw);
        return data.map(c => ({ ...c, services: c.services || (c.service ? [c.service] : []) }));
      } catch (e) { return []; }
    }

    function saveToStorage(contacts) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts)); } catch (e) {}
    }

    function svcLabel(c) {
      const s = c.services?.length > 0 ? c.services : (c.service ? [c.service] : []);
      if (s.length === 0) return "—";
      if (s.length === 1) return s[0];
      return `${s[0]} +${s.length - 1}`;
    }

    // ── ServiceCheckboxes ──────────────────────────────────────────────────────
    function ServiceCheckboxes({ selected, onChange }) {
      function toggle(svc) {
        onChange(selected.includes(svc) ? selected.filter(s => s !== svc) : [...selected, svc]);
      }
      return (
        <div className="flex flex-wrap gap-2">
          {SERVICES.map(svc => (
            <button key={svc} type="button" onClick={() => toggle(svc)}
              className="text-xs px-3 py-1.5 rounded-full border font-medium transition-all"
              style={selected.includes(svc)
                ? { backgroundColor: BRAND, color: "#fff", borderColor: BRAND }
                : { backgroundColor: "#fff", color: "#6b7280", borderColor: "#e5e7eb" }}>
              {svc}
            </button>
          ))}
        </div>
      );
    }

    // ── Main App ───────────────────────────────────────────────────────────────
    function App() {
      const [contacts, setContacts]     = useState([]);
      const [view, setView]             = useState("pipeline");
      const [form, setForm]             = useState(EMPTY_FORM);
      const [editId, setEditId]         = useState(null);
      const [selected, setSelected]     = useState(null);
      const [search, setSearch]         = useState("");
      const [filterStage, setFilterStage] = useState("All");
      const [saving, setSaving]         = useState(false);

      // Load on mount
      useEffect(() => { setContacts(loadFromStorage()); }, []);

      function persistContacts(updated) {
        setContacts(updated);
        setSaving(true);
        saveToStorage(updated);
        setTimeout(() => setSaving(false), 600);
      }

      function handleSubmit() {
        if (!form.name.trim()) return;
        const updated = editId
          ? contacts.map(c => c.id === editId ? { ...c, ...form } : c)
          : [...contacts, { ...form, id: genId(), createdAt: new Date().toISOString() }];
        persistContacts(updated);
        setForm(EMPTY_FORM);
        setEditId(null);
        setView("pipeline");
      }

      function updateStage(id, stage) {
        const updated = contacts.map(c => c.id === id ? { ...c, stage } : c);
        persistContacts(updated);
        if (selected?.id === id) setSelected(prev => ({ ...prev, stage }));
      }

      function deleteContact(id) {
        if (!window.confirm("Delete this contact? This cannot be undone.")) return;
        const updated = contacts.filter(c => c.id !== id);
        persistContacts(updated);
        setSelected(null);
        setView("pipeline");
      }

      function startEdit(contact) {
        setForm({ ...EMPTY_FORM, ...contact, services: contact.services || (contact.service ? [contact.service] : []) });
        setEditId(contact.id);
        setView("add");
      }

      function openDetail(c) { setSelected(c); setView("detail"); }

      function setF(key, val) { setForm(f => ({ ...f, [key]: val })); }

      // Derived stats
      const totalValue     = contacts.reduce((s, c) => s + parseFloat(c.budgetUsd || 0), 0);
      const activeCount    = contacts.filter(c => !["Completed","Lost"].includes(c.stage)).length;
      const completedCount = contacts.filter(c => c.stage === "Completed").length;

      // Filtered list
      const filtered = contacts.filter(c => {
        const q = search.toLowerCase();
        const matchSearch = !search ||
          c.name.toLowerCase().includes(q) ||
          (c.email || "").toLowerCase().includes(q) ||
          (c.destination || "").toLowerCase().includes(q);
        return matchSearch && (filterStage === "All" || c.stage === filterStage);
      });

      const inp = "w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent bg-white";
      const lbl = "block text-xs font-semibold text-gray-600 mb-1";

      // ── Render ──
      return (
        <div className="min-h-screen bg-gray-50">

          {/* ── Header ── */}
          <div style={{ backgroundColor: BRAND }} className="text-white px-6 py-4 flex items-center justify-between shadow-lg">
            <div>
              <div className="text-xl font-bold tracking-wide">✈ AuraScape CRM</div>
              <div className="text-blue-200 text-xs mt-0.5">Lead &amp; Booking Pipeline</div>
            </div>
            <div className="flex gap-3 items-center">
              {saving && <span className="text-blue-200 text-xs animate-pulse">Saved ✓</span>}
              <button
                onClick={() => { setForm(EMPTY_FORM); setEditId(null); setView("add"); }}
                style={{ backgroundColor: GOLD }}
                className="text-white text-sm font-bold px-5 py-2 rounded-lg hover:opacity-90 transition shadow">
                + New Lead
              </button>
            </div>
          </div>

          {/* ── Nav Tabs ── */}
          <div className="bg-white border-b px-6 flex gap-1 pt-2 shadow-sm">
            {[["pipeline","🗂 Pipeline"],["list","📋 All Contacts"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 transition ${
                  view === v ? "border-blue-700 text-blue-700 bg-blue-50" : "border-transparent text-gray-500 hover:text-gray-700"}`}>
                {label}
              </button>
            ))}
          </div>

          <div className="p-6">

            {/* ── Stats Bar ── */}
            {(view === "pipeline" || view === "list") && (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                {[
                  ["Total Contacts",  contacts.length,                      "#1B3F6E"],
                  ["Active Pipeline", activeCount,                           "#7c3aed"],
                  ["Completed",       completedCount,                        "#15803d"],
                  ["Pipeline Value",  "$" + totalValue.toLocaleString(),     "#b45309"],
                ].map(([label, val, color]) => (
                  <div key={label} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                    <div className="text-2xl font-bold" style={{ color }}>{val}</div>
                    <div className="text-xs text-gray-500 mt-1">{label}</div>
                  </div>
                ))}
              </div>
            )}

            {/* ── PIPELINE VIEW ── */}
            {view === "pipeline" && (
              <div className="overflow-x-auto pb-4">
                <div className="flex gap-4" style={{ minWidth: "max-content" }}>
                  {STAGES.map(stage => {
                    const cards = contacts.filter(c => c.stage === stage);
                    return (
                      <div key={stage} style={{ width: "260px", flexShrink: 0 }}>
                        <div className="flex items-center justify-between mb-3">
                          <span className={`text-xs font-bold px-2 py-1 rounded-full ${STAGE_COLORS[stage]}`}>{stage}</span>
                          <span className="text-xs text-gray-400 font-semibold">{cards.length}</span>
                        </div>
                        <div className="space-y-2">
                          {cards.map(c => (
                            <div key={c.id} onClick={() => openDetail(c)}
                              className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-200 cursor-pointer transition-all">
                              <div className="font-semibold text-gray-800 text-sm leading-tight">{c.name}</div>
                              {c.email && <div className="text-xs text-gray-400 mt-0.5 truncate">✉ {c.email}</div>}
                              <div className="text-xs text-gray-500 mt-1">{svcLabel(c)}</div>
                              {c.destination && <div className="text-xs text-blue-600 mt-0.5">📍 {c.destination}</div>}
                              {c.budgetUsd && <div className="text-xs font-bold text-green-600 mt-1">${parseFloat(c.budgetUsd).toLocaleString()}</div>}
                              {c.travelDate && <div className="text-xs text-gray-400 mt-0.5">🗓 {c.travelDate}</div>}
                              <div className="text-xs text-gray-300 mt-1 uppercase tracking-wide font-medium">{c.type}</div>
                            </div>
                          ))}
                          {!cards.length && (
                            <div className="rounded-xl p-5 text-center text-xs text-gray-300 border border-dashed border-gray-200 bg-gray-50">
                              No leads
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── LIST VIEW ── */}
            {view === "list" && (
              <div>
                <div className="flex gap-3 mb-4">
                  <input
                    placeholder="Search by name, email or destination..."
                    value={search} onChange={e => setSearch(e.target.value)}
                    className="flex-1 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white"
                  />
                  <select value={filterStage} onChange={e => setFilterStage(e.target.value)}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none bg-white">
                    <option value="All">All Stages</option>
                    {STAGES.map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-auto">
                  <table className="w-full text-sm" style={{ minWidth: "900px" }}>
                    <thead>
                      <tr style={{ backgroundColor: BRAND }}>
                        {["Name","Email","Type","Services","Destination","Stage","Budget","Travel Date","Source"].map(h => (
                          <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-white whitespace-nowrap">{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {!filtered.length && (
                        <tr><td colSpan="9" className="text-center py-10 text-gray-400">No contacts found</td></tr>
                      )}
                      {filtered.map((c, i) => (
                        <tr key={c.id} onClick={() => openDetail(c)}
                          className={`cursor-pointer hover:bg-blue-50 transition ${i % 2 === 0 ? "bg-white" : "bg-gray-50"}`}>
                          <td className="px-4 py-3 font-semibold text-gray-800 whitespace-nowrap">{c.name}</td>
                          <td className="px-4 py-3 text-gray-500 max-w-xs" style={{ maxWidth: "180px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.email || "—"}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{c.type}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{svcLabel(c)}</td>
                          <td className="px-4 py-3 text-blue-600 whitespace-nowrap">{c.destination || "—"}</td>
                          <td className="px-4 py-3 whitespace-nowrap">
                            <span className={`text-xs px-2 py-1 rounded-full font-medium ${STAGE_COLORS[c.stage]}`}>{c.stage}</span>
                          </td>
                          <td className="px-4 py-3 text-green-700 font-semibold whitespace-nowrap">{c.budgetUsd ? "$" + parseFloat(c.budgetUsd).toLocaleString() : "—"}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{c.travelDate || "—"}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{c.source}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ── ADD / EDIT FORM ── */}
            {view === "add" && (
              <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h2 className="text-lg font-bold mb-1" style={{ color: BRAND }}>{editId ? "Edit Contact" : "Add New Lead"}</h2>
                <p className="text-xs text-gray-400 mb-6">Fields marked * are required</p>

                <div className="grid grid-cols-2 gap-4">

                  <div className="col-span-2">
                    <label className={lbl}>Full Name *</label>
                    <input type="text" value={form.name} onChange={e => setF("name", e.target.value)}
                      placeholder="e.g. Jane Smith" className={inp} />
                  </div>

                  <div className="col-span-2">
                    <label className={lbl}>📧 Email Address</label>
                    <input type="email" value={form.email} onChange={e => setF("email", e.target.value)}
                      placeholder="e.g. jane@company.com" className={inp} />
                  </div>

                  <div>
                    <label className={lbl}>📞 Phone</label>
                    <input type="tel" value={form.phone} onChange={e => setF("phone", e.target.value)}
                      placeholder="e.g. +1 876 555 0000" className={inp} />
                  </div>

                  <div>
                    <label className={lbl}>📍 Destination</label>
                    <input type="text" value={form.destination} onChange={e => setF("destination", e.target.value)}
                      placeholder="e.g. Paris, France" className={inp} />
                  </div>

                  <div>
                    <label className={lbl}>🗓 Travel Date</label>
                    <input type="date" value={form.travelDate} onChange={e => setF("travelDate", e.target.value)} className={inp} />
                  </div>

                  <div>
                    <label className={lbl}>💰 Budget (USD)</label>
                    <input type="number" value={form.budgetUsd} onChange={e => setF("budgetUsd", e.target.value)}
                      placeholder="e.g. 5000" className={inp} />
                  </div>

                  <div>
                    <label className={lbl}>Client Type</label>
                    <select value={form.type} onChange={e => setF("type", e.target.value)} className={inp}>
                      {["Leisure","Corporate","Luxe Adventure"].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>

                  <div>
                    <label className={lbl}>Pipeline Stage</label>
                    <select value={form.stage} onChange={e => setF("stage", e.target.value)} className={inp}>
                      {STAGES.map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>

                  <div className="col-span-2">
                    <label className={lbl}>Lead Source</label>
                    <select value={form.source} onChange={e => setF("source", e.target.value)} className={inp}>
                      {["Referral","Instagram","TikTok","Google Ads","LinkedIn","Conference","Existing Client","Other"].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>

                  <div className="col-span-2">
                    <label className={lbl}>Services Required <span className="text-gray-400 font-normal">(select all that apply)</span></label>
                    <ServiceCheckboxes selected={form.services || []} onChange={svcs => setF("services", svcs)} />
                    {form.services?.length > 0 && (
                      <p className="mt-2 text-xs font-medium" style={{ color: BRAND }}>
                        {form.services.length} selected: {form.services.join(", ")}
                      </p>
                    )}
                  </div>

                  <div className="col-span-2">
                    <label className={lbl}>Notes</label>
                    <textarea value={form.notes} onChange={e => setF("notes", e.target.value)} rows="3"
                      placeholder="Special requests, preferences, follow-up actions..."
                      className={inp} style={{ resize: "vertical" }} />
                  </div>
                </div>

                <div className="flex gap-3 mt-6">
                  <button onClick={handleSubmit} style={{ backgroundColor: BRAND }}
                    className="flex-1 text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition">
                    {editId ? "Save Changes" : "Add Lead"}
                  </button>
                  <button onClick={() => { setView("pipeline"); setForm(EMPTY_FORM); setEditId(null); }}
                    className="px-6 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {/* ── DETAIL VIEW ── */}
            {view === "detail" && selected && (() => {
              const svcs = selected.services?.length > 0 ? selected.services : (selected.service ? [selected.service] : []);
              return (
                <div className="max-w-xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                  <div className="flex items-start justify-between mb-5">
                    <div>
                      <h2 className="text-xl font-bold text-gray-800">{selected.name}</h2>
                      <div className="text-sm text-gray-400 mt-0.5">{selected.type}</div>
                    </div>
                    <span className={`text-xs font-bold px-3 py-1 rounded-full ${STAGE_COLORS[selected.stage]}`}>{selected.stage}</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 mb-4">
                    {[
                      ["📧 Email",       selected.email || "—"],
                      ["📞 Phone",       selected.phone || "—"],
                      ["📍 Destination", selected.destination || "—"],
                      ["🗓 Travel Date", selected.travelDate || "—"],
                      ["💰 Budget",      selected.budgetUsd ? "$" + parseFloat(selected.budgetUsd).toLocaleString() : "—"],
                      ["📣 Source",      selected.source || "—"],
                    ].map(([label, val]) => (
                      <div key={label} className="bg-gray-50 rounded-lg p-3">
                        <div className="text-xs text-gray-400 mb-0.5">{label}</div>
                        <div className="text-sm font-medium text-gray-700 break-words">{val}</div>
                      </div>
                    ))}
                  </div>

                  {svcs.length > 0 && (
                    <div className="mb-4">
                      <div className="text-xs font-semibold text-gray-500 mb-2">Services</div>
                      <div className="flex flex-wrap gap-2">
                        {svcs.map(s => (
                          <span key={s} className="text-white text-xs px-3 py-1 rounded-full font-medium" style={{ backgroundColor: BRAND }}>{s}</span>
                        ))}
                      </div>
                    </div>
                  )}

                  {selected.notes && (
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4">
                      <div className="text-xs font-semibold text-yellow-700 mb-1">📝 Notes</div>
                      <div className="text-sm text-gray-700 leading-relaxed">{selected.notes}</div>
                    </div>
                  )}

                  <div className="mb-5">
                    <div className="text-xs font-semibold text-gray-500 mb-2">Move Stage</div>
                    <div className="flex flex-wrap gap-2">
                      {STAGES.map(s => (
                        <button key={s} onClick={() => updateStage(selected.id, s)}
                          className={`text-xs px-3 py-1.5 rounded-full font-medium transition border ${
                            selected.stage === s
                              ? STAGE_COLORS[s] + " " + STAGE_BORDER[s]
                              : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}>
                          {s}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="flex gap-3">
                    <button onClick={() => startEdit(selected)} style={{ backgroundColor: BRAND }}
                      className="flex-1 text-white text-sm font-semibold py-2.5 rounded-lg hover:opacity-90 transition">
                      ✏️ Edit
                    </button>
                    <button onClick={() => setView("pipeline")}
                      className="flex-1 border border-gray-200 text-sm text-gray-600 py-2.5 rounded-lg hover:bg-gray-50 transition">
                      ← Back
                    </button>
                    <button onClick={() => deleteContact(selected.id)}
                      className="px-4 py-2.5 bg-red-50 text-red-600 text-sm rounded-lg hover:bg-red-100 transition border border-red-200">
                      🗑 Delete
                    </button>
                  </div>
                </div>
              );
            })()}

          </div>

          {/* ── Footer ── */}
          <div className="text-center text-xs text-gray-300 py-6">
            AuraScape Travels CRM · Data stored locally in your browser
          </div>
        </div>
      );
    }

    // ── Mount ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
